name: fraudebot

services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: laravel-clean-app
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./docker/php/conf.d/php.ini:/usr/local/etc/php/conf.d/php.ini
      - ./docker/php/conf.d/opcache.ini:/usr/local/etc/php/conf.d/opcache.ini
    depends_on:
      - db
      - cache
    networks:
      - fraudebot-api-network
    env_file:
      - ./docker/php/.env.php

  web:
    image: nginx:alpine
    ports:
      - "9000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - fraudebot-network
      - fraudebot-api-network
    depends_on:
      - backend

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - 80:80
    command: sh -c "if [ -f package.json ]; then npm install && npm run dev; else tail -f /dev/null; fi"
    networks:
      - fraudebot-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./docker/db/.env.db
    ports:
      - 3306:3306
    volumes:
      - fraudebot-db-data:/var/lib/mysql
      - ./docker/db/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - fraudebot-api-network

  cache:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - fraudebot-cache-data:/data
    networks:
      - fraudebot-api-network

networks:
  fraudebot-network:
    driver: bridge

  fraudebot-api-network:
    driver: bridge

volumes:
  fraudebot-db-data:
  fraudebot-cache-data:
